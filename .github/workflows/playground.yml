name: Playground

on:
  merge_group:
  workflow_dispatch:
  pull_request:
  push:
    paths: ['.github/workflows/playground.yml', '**/*.yml']
  release:
    types:
      - published
      - released

permissions:
  checks: write

defaults:
  run:
    shell: bash

jobs:
  playground:
    runs-on: ubuntu-latest
    steps:
      - run: sleep 60
      - uses: actions/checkout@v6
      - run: git fetch --depth=2 origin "$GITHUB_SHA"
      - run: git show HEAD
      - run: git show HEAD~1

  playground2:
    runs-on: ubuntu-latest
    steps:
      - run: sleep 60
      - uses: actions/checkout@v6
      - run: git fetch --depth=2 origin HEAD
      - run: git show HEAD
      - run: git show HEAD~1
      
