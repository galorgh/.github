name: Playground

on:
  merge_group:
  workflow_dispatch:
  pull_request:
  push:
    paths: ['.github/workflows/playground.yml', '**/*.yml']
  release:
    types:
      - published
      - released

permissions:
  checks: write

defaults:
  run:
    shell: bash

jobs:
  playground:  
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: git rev-parse HEAD~1
        continue-on-error: true
      - run: git fetch --deepen=1
      
